<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>log in</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">

    <!-- Logo -->
    <div class="flex justify-center mb-4">
      <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" 
      class="w-12 h-12">
    </div>

    <!-- Title -->
    <h1 class="text-2xl font-bold text-center mb-2">
      GitHub Issues Tracker
    </h1>

    <!-- Subtitle -->
    <p class="text-gray-500 text-center mb-6">
      Sign in to continue
    </p>

    <!-- Form -->
    <form id="loginForm" class="space-y-4">

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium mb-1">Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter username"
          class="w-full border rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter password"
          class="w-full border rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition"
      >
        Sign In
      </button>

    </form>

    <!-- Demo Credential -->
    <div class="mt-6 text-center text-sm text-gray-600">
      <p>Demo Credentials:</p>
      <p class="font-medium">Username: admin</p>
      <p class="font-medium">Password: admin123</p>
    </div>

    <!-- Error Message -->
    <p id="error" class="text-red-500 text-center mt-3 hidden">
      Invalid username or password
    </p>

  </div>


<script src="script.js"></script>

</body>
</html>
