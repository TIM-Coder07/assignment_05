<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Hub Issues Tracker</title>
    <link rel="icon" type="image/png" href="assets/github-logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header class="bg-white shadow-md sticky top-0">
      <div
        class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between"
      >
        <!-- Logo / Website Name -->
        <div class="flex items-center gap-2">
          <img src="assets/github-logo.png" class="w-8 h-8" />
          <h1 class="text-xl font-bold text-gray-800">Issue Tracker</h1>
        </div>

        <!-- Search Section -->
        <div class="flex items-center gap-2 mb-4">
  <input
    id="search-input"
    type="text"
    placeholder="Search by title, description, or label..."
    class="flex-1 p-2 border rounded-l"
  />
  <button
    id="search-btn"
    class="bg-blue-600 text-white px-4 py-1.5 rounded-r hover:bg-blue-700 transition"
  >
    Search
  </button>
</div>
      </div>
    </header>

    <main>
 <div class="max-w-7xl mx-auto px-4 py-4">

    <!-- Tabs -->
    <div class="flex space-x-2 mb-6">
      <button class="tab-btn px-4 py-2 rounded bg-green-500 text-white font-semibold" data-tab="all">All</button>
      <button class="tab-btn px-4 py-2 rounded bg-gray-200 text-gray-700 font-semibold" data-tab="open">Open</button>
      <button class="tab-btn px-4 py-2 rounded bg-gray-200 text-gray-700 font-semibold" data-tab="closed">Closed</button>
    </div>

  <!-- Tabs data-->
<div class="tabs mb-4 flex justify-between items-center bg-gray-200 p-4 rounded">

  <!-- Left Side Tabs -->
  <div class="flex gap-6 text-lg ">
    <p><span id="allCount">(0)</span> Issues count</p>
  </div>

  <!-- Right Side Status -->
  <div class="flex gap-6 items-center">
    <p class="flex items-center gap-2">
      <span class="w-3 h-3 bg-green-700 rounded-full inline-block"></span>
      Open
    </p>

    <p class="flex items-center gap-2">
      <span class="w-3 h-3 bg-purple-700 rounded-full inline-block"></span>
      Close
    </p>
  </div>

</div>

  <!-- Issues Container -->
  <div id="tab-content" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 p-4 border rounded bg-gray-50 min-h-[200px]">
  <p class="text-gray-500 col-span-full text-center">Select a tab to see issues.</p>
</div>
  </div>

</div>


   <!-- Open the modal using ID.showModal() method -->
<dialog id="my_modal_1" class="modal">
  <div class="modal-box max-w-2xl">

    <!-- Title -->
    <h3 id="modal-title" class="text-2xl font-bold text-gray-800 mb-2"></h3>

    <!-- Description -->
    <p id="modal-description" class="text-gray-600 mb-4 leading-relaxed"></p>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Issue Info -->
    <div class="grid grid-cols-2 gap-4 text-sm">

      <!-- Status -->
      <div>
        <p class="text-gray-500 font-medium">Status</p>
        <span id="modal-status"
          class="inline-block mt-1 px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-700">
        </span>
      </div>

      <!-- Priority -->
      <div>
        <p class="text-gray-500 font-medium">Priority</p>
        <span id="modal-priority"
          class="inline-block mt-1 px-3 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-700">
        </span>
      </div>

      <!-- Author -->
      <div>
        <p class="text-gray-500 font-medium">Assignee</p>
        <p id="modal-author" class="font-semibold text-gray-700 mt-1"></p>
      </div>

      <!-- Labels -->
      <div>
        <p class="text-gray-500 font-medium">Labels</p>
        <div id="modal-labels" class="flex flex-wrap gap-2 mt-1"></div>
      </div>

    </div>

    <!-- Date -->
    <p class="text-xs text-gray-400 mt-4" id="modal-date"></p>

    <!-- Close Button -->
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-neutral">Close</button>
      </form>
    </div>

  </div>
</dialog>
    </main>

    <!-- script link  -->
    <script src="script.js"></script>
  </body>
</html>
